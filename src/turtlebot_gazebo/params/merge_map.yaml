map_merge:
  ros__parameters:
    merging_rate: 0.5
    discovery_rate: 0.05
    estimation_rate: 0.2
    estimation_confidence: 0.3
    robot_map_topic: map
    robot_map_updates_topic: map_updates
    robot_namespace: "robot"
    merged_map_topic: merge_map
    world_frame: $(var namespace)/map
    # known_init_poses: true
    known_init_poses: false

    # Define here robots' positions in the map if known_init_poses is true
    /robot1/map_merge/init_pose_x: 5.0
    /robot1/map_merge/init_pose_y: 5.0
    /robot1/map_merge/init_pose_z: 0.0
    /robot1/map_merge/init_pose_yaw: 0.0

    /robot2/map_merge/init_pose_x: 5.0
    /robot2/map_merge/init_pose_y: 2.0
    /robot2/map_merge/init_pose_z: 0.0
    /robot2/map_merge/init_pose_yaw: 0.0    